name: Medical Image Standard CI

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12, 3.13, 3.14]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Install uv (manages Python itself)
    - name: Install uv
      uses: astral-sh/setup-uv@v2

    # Install correct Python version via uv
    - name: Install Python with uv
      run: |
        uv python install ${{ matrix.python-version }}
        uv python pin ${{ matrix.python-version }}

      # Sync dependencies (project + dev)
    - name: Install dependencies
      run: |
        uv sync --all-extras

    # Run tests inside uv virtual environment
    - name: Run tests
      run: uv run pytest medical_image/tests/test_dicom.py medical_image/tests/test_patch.py

    # Black formatting check
    - name: Run Black
      run: uv run black --check --diff .


